<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posicionamiento Relative y Absolute</title>
    <link rel="stylesheet" href="posicionamiento.css">
</head>
<body>

    <h1>Posicionamiento Relative, Absolute y Fixed</h1>

    <div class="contenedor">

        <div class="caja rojo">
            top:0 <br>
            left:0
        </div>

        <div class="caja naranja">
            top:0 <br>
            right:0
        </div>

        <div class="caja amarillo">
            bottom:0 <br>
            left:0
        </div>

        <div class="caja verde">
            bottom:0 <br>
            right:0
        </div>

        <div class="caja centro">
            center
        </div>

    </div>

    <!-- FIXED -->
    <div class="fijo fijo-arriba">
        🔒 Fixed Top
    </div>

    <div class="fijo fijo-abajo">
        🔒 Fixed Bottom
    </div>

    <div class="scroll-indicador">
        Scroll ↓
    </div>

    <!-- CONTENIDO LARGO -->
    <div class="bloque azul">Sección 1</div>
    <div class="bloque rojo2">Sección 2</div>
    <div class="bloque verde2">Sección 3</div>
    <div class="bloque morado">Sección 4</div>
    <div class="bloque gris">Sección 5</div>

</body>
</html>
