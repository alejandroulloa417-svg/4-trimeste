<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Diseño Profesional</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#eef3f8;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* ESCENA */

.scene{
    position:relative;
    width:900px;
    height:700px;
}

/* =========================================
   TIERRA
========================================= */

.planet{
    position:absolute;
    bottom:120px;
    left:50%;
    transform:translateX(-50%);
    width:560px;
    height:180px;
}

/* SUPERFICIE */

.top{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:50%;

    background:
    radial-gradient(circle at 50% 20%,
    #4cc7ff 0%,
    #1f9fe0 35%,
    #0b79bc 70%,
    #07598f 100%);

    box-shadow:
    inset 0 -18px 30px rgba(0,0,0,.25),
    inset 0 10px 20px rgba(255,255,255,.15),
    0 35px 50px rgba(0,0,0,.20);
}

/* BORDE INFERIOR */

.side{
    position:absolute;
    bottom:-30px;
    width:100%;
    height:60px;

    background:
    linear-gradient(to bottom,
    #0a5d94,
    #063f65);

    border-radius:0 0 50% 50%;

    overflow:hidden;
}

/* DETALLE LATERAL */

.side::before{
    content:'';
    position:absolute;
    width:100%;
    height:12px;
    top:10px;

    background:
    repeating-linear-gradient(
        90deg,
        rgba(255,255,255,.08),
        rgba(255,255,255,.08) 2px,
        transparent 2px,
        transparent 10px
    );
}

/* CONTINENTES */

.land{
    position:absolute;
    inset:0;
}

.land::before{
    content:'';
    position:absolute;
    width:130px;
    height:85px;

    background:#1c2a34;

    left:215px;
    top:62px;

    clip-path:polygon(
    15% 20%,
    40% 10%,
    65% 25%,
    75% 50%,
    60% 75%,
    25% 70%,
    5% 40%
    );

    filter:drop-shadow(0 5px 8px rgba(0,0,0,.25));
}

/* MAPA SUAVE */

.land::after{
    content:'';
    position:absolute;
    width:340px;
    height:120px;

    left:110px;
    top:40px;

    opacity:.15;

    background:
    radial-gradient(circle at 20% 50%, #fff 0 18%, transparent 20%),
    radial-gradient(circle at 45% 40%, #fff 0 15%, transparent 18%),
    radial-gradient(circle at 75% 50%, #fff 0 18%, transparent 20%);
}

/* =========================================
   SOMBRA DEL PUNTERO
========================================= */

.pointer-shadow{
    position:absolute;
    width:170px;
    height:35px;

    background:rgba(0,0,0,.35);

    left:50%;
    bottom:235px;

    transform:translateX(-50%);

    border-radius:50%;

    filter:blur(18px);
}

/* =========================================
   PUNTERO 3D
========================================= */

.pointer{
    position:absolute;

    width:160px;
    height:340px;

    left:50%;
    top:80px;

    transform:translateX(-50%);
}

/* CARA IZQUIERDA */

.red{
    position:absolute;
    width:100%;
    height:100%;

    background:linear-gradient(
    to bottom,
    #ff3557,
    #b50d2f);

    clip-path:polygon(
    0 0,
    25% 0,
    50% 100%
    );
}

/* CARA CENTRAL */

.blue{
    position:absolute;
    width:100%;
    height:100%;

    background:linear-gradient(
    to bottom,
    #0c4fd6,
    #002d88);

    clip-path:polygon(
    20% 0,
    60% 0,
    50% 100%
    );
}

/* CARA DERECHA */

.yellow{
    position:absolute;
    width:100%;
    height:100%;

    background:linear-gradient(
    to bottom,
    #ffd941,
    #d9a900);

    clip-path:polygon(
    60% 0,
    100% 0,
    50% 100%
    );
}

/* BRILLO */

.pointer::after{
    content:'';

    position:absolute;

    width:10px;
    height:100%;

    left:48%;
    top:0;

    background:rgba(255,255,255,.25);

    filter:blur(4px);
}

/* BORDE */

.outline{
    position:absolute;
    inset:0;

    clip-path:polygon(
    50% 100%,
    0 0,
    100% 0
    );

    border:3px solid rgba(0,0,0,.15);
}

/* ========================================= */

.title{
    position:absolute;
    top:30px;
    width:100%;
    text-align:center;

    font-size:34px;
    font-weight:700;
    color:#17324d;

    letter-spacing:2px;
}

.subtitle{
    position:absolute;
    top:80px;
    width:100%;
    text-align:center;

    font-size:16px;
    color:#5a6c7d;
}

</style>
</head>

<body>

<div class="scene">

    <div class="title">
        FLAT EARTH CONCEPT
    </div>

    <div class="subtitle">
        Professional Vector Style
    </div>

    <div class="pointer">

        <div class="red"></div>
        <div class="blue"></div>
        <div class="yellow"></div>
        <div class="outline"></div>

    </div>

    <div class="pointer-shadow"></div>

    <div class="planet">

        <div class="top"></div>

        <div class="land"></div>

        <div class="side"></div>

    </div>

</div>

</body>
</html>
