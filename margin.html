<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Margin Auto + Centrado</title>
  <link rel="stylesheet" href="margin.css">
</head>
<body>

  <!-- 1. margin: auto -->
  <div class="caja">
    Centrada con margin: auto
  </div>

  <hr>

  <!-- 2. menu con margin-left: auto -->
  <nav class="menu">
    <a href="#">Inicio</a>
    <a href="#">Servicios</a>
    <a href="#">Productos</a>
    <a class="login" href="#">Login</a>
  </nav>

  <hr>

  <!-- 3. margin: 0 auto -->
  <div class="card">
    Centrada con margin: 0 auto
  </div>

  <hr>

  <!-- 4. CUADRADO CENTRADO -->
  <div class="contenedor-centro">
    <div class="cuadrado">
      Centrado perfecto
    </div>
  </div>

</body>
</html>
