<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Score Hero CSS</title>
    <link rel="stylesheet" href="juego2.css">
</head>
<body>

<h1>⚽ Score Hero CSS</h1>

<div class="panel">

    <h2>Selecciona tu jugador</h2>

    <input type="radio" name="jugador" id="james">
    <label for="james">🇨🇴 James</label>

    <input type="radio" name="jugador" id="diaz">
    <label for="diaz">🇨🇴 Luis Díaz</label>

    <input type="radio" name="jugador" id="mbappe">
    <label for="mbappe">🇫🇷 Mbappé</label>

</div>

<div class="panel">

    <h2>Selecciona el disparo</h2>

    <input type="radio" name="tiro" id="izquierda">
    <label for="izquierda">↖ Izquierda</label>

    <input type="radio" name="tiro" id="centro">
    <label for="centro">⬆ Centro</label>

    <input type="radio" name="tiro" id="derecha">
    <label for="derecha">↗ Derecha</label>

</div>

<div class="campo">

    <div class="arco"></div>

    <div class="arquero">🧤</div>

    <div class="balon">⚽</div>

    <div class="jugador">🧍‍♂️</div>

</div>

<div class="resultado">
    Elige jugador y dirección
</div>

</body>
</html>
