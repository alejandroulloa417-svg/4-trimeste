<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambio de Idioma con :lang()</title>
    <link rel="stylesheet" href="lang.css">
</head>
<body>

    <h1>🌎 Selector de Idioma</h1>

    <div class="botones">
        <a href="#es">🇪🇸 Español</a>
        <a href="#en">🇺🇸 English</a>
        <a href="#fr">🇫🇷 Français</a>
        <a href="#zh">🇨🇳 中文</a>
    </div>

    <div class="contenedor">

        <section id="es" lang="es">
            <h2>¡Hola!</h2>
            <p>Bienvenido a nuestra página web.</p>
        </section>

        <section id="en" lang="en">
            <h2>Hello!</h2>
            <p>Welcome to our website.</p>
        </section>

        <section id="fr" lang="fr">
            <h2>Bonjour !</h2>
            <p>Bienvenue sur notre site web.</p>
        </section>
        
        <section id="zh" lang="zh">
            <h2>你好！</h2>
            <p>欢迎来到我们的网站。</p>
    </div>

</body>
</html>
