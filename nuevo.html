<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Texto con imagen</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#272727;
}

h1{
    font-size:120px;
    font-family:Arial, Helvetica, sans-serif;
    font-weight:bold;

    background-image:url("https://www.laopinion.co/sites/default/files/styles/portada_principal_747x420/public/2022-12/7%20NEYMAR%20JR.jpg?itok=tp8uyp1C");

    background-size:cover;
    background-position:center;

    background-clip:text;
    -webkit-background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<h1>NEYMAR JR</h1>

</body>
</html>
